name: Test Claude Code Kit
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show system info
        shell: cmd
        run: |
          chcp 65001
          echo === Windows Version ===
          ver
          echo === winget check ===
          winget --version || echo winget not available

      - name: Install Node.js via setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test - Node.js is available
        shell: cmd
        run: |
          chcp 65001
          where node
          node --version
          where npm
          npm --version

      - name: Test - Install Claude Code via npm
        shell: cmd
        run: |
          chcp 65001
          call npm install -g @anthropic-ai/claude-code --registry=https://registry.npmmirror.com
          if %errorlevel% neq 0 (
            echo FAIL: npm install failed
            exit /b 1
          )
          echo === Verify claude command ===
          where claude
          claude --version

      - name: Test - Onboarding config init
        shell: cmd
        run: |
          chcp 65001
          node --eval "const os=require('os'),fs=require('fs'),path=require('path');const f=path.join(os.homedir(),'.claude.json');let c={};try{if(fs.existsSync(f))c=JSON.parse(fs.readFileSync(f,'utf-8'));}catch(e){}c.hasCompletedOnboarding=true;fs.writeFileSync(f,JSON.stringify(c,null,2),'utf-8');console.log('OK: '+f);"
          if %errorlevel% neq 0 (
            echo FAIL: config init failed
            exit /b 1
          )
          echo === Verify config file ===
          type %USERPROFILE%\.claude.json

      - name: Test - Set env vars (simulates 2-设置密钥.bat)
        shell: cmd
        run: |
          chcp 65001
          powershell -Command "[System.Environment]::SetEnvironmentVariable('ANTHROPIC_BASE_URL','https://api.kimi.com/coding/',[System.EnvironmentVariableTarget]::User)"
          if %errorlevel% neq 0 (
            echo FAIL: set BASE_URL failed
            exit /b 1
          )
          powershell -Command "[System.Environment]::SetEnvironmentVariable('ANTHROPIC_API_KEY','sk-kimi-test-dummy-key',[System.EnvironmentVariableTarget]::User)"
          if %errorlevel% neq 0 (
            echo FAIL: set API_KEY failed
            exit /b 1
          )
          echo OK: env vars set

      - name: Test - Read env vars back (simulates 3-启动.bat)
        shell: cmd
        run: |
          chcp 65001
          for /f "tokens=*" %%i in ('powershell -NoProfile -Command "[System.Environment]::GetEnvironmentVariable('ANTHROPIC_BASE_URL','User')"') do set ANTHROPIC_BASE_URL=%%i
          for /f "tokens=*" %%i in ('powershell -NoProfile -Command "[System.Environment]::GetEnvironmentVariable('ANTHROPIC_API_KEY','User')"') do set ANTHROPIC_API_KEY=%%i
          echo BASE_URL=%ANTHROPIC_BASE_URL%
          if "%ANTHROPIC_BASE_URL%"=="" (
            echo FAIL: BASE_URL not found
            exit /b 1
          )
          if "%ANTHROPIC_API_KEY%"=="" (
            echo FAIL: API_KEY not found
            exit /b 1
          )
          echo OK: all env vars loaded

      - name: Test - Full 1-安装.bat script syntax check
        shell: powershell
        run: |
          # Verify BOM header exists on all .bat files
          $batFiles = Get-ChildItem -Filter "*.bat"
          foreach ($f in $batFiles) {
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            if ($bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
              Write-Error "FAIL: $($f.Name) missing UTF-8 BOM"
              exit 1
            }
            Write-Host "OK: $($f.Name) has UTF-8 BOM"
          }
          # Verify 使用说明.txt BOM too
          $txt = Get-Item "使用说明.txt"
          $bytes = [System.IO.File]::ReadAllBytes($txt.FullName)
          if ($bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
            Write-Error "FAIL: 使用说明.txt missing UTF-8 BOM"
            exit 1
          }
          Write-Host "OK: 使用说明.txt has UTF-8 BOM"

      - name: Test - Run 1-安装.bat (with node pre-installed)
        shell: cmd
        run: |
          chcp 65001
          echo === Running install script (node already available, should skip to claude install) ===
          echo.
          
          :: Simulate what the script does (minus winget and pause)
          where winget >nul 2>nul
          if %errorlevel% neq 0 (
            echo NOTE: winget not in CI, testing node/claude path only
          )
          
          where node >nul 2>nul
          if %errorlevel% equ 0 (
            echo OK: Node.js detected, version:
            node --version
          ) else (
            echo FAIL: Node.js should be available
            exit /b 1
          )
          
          where claude >nul 2>nul
          if %errorlevel% equ 0 (
            echo OK: Claude Code detected
            claude --version
          ) else (
            echo FAIL: Claude Code should be available
            exit /b 1
          )
          
          echo.
          echo === All checks passed ===
